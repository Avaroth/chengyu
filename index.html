<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>每日成语 · 三页通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Noto Sans CJK SC', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f2efe9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 8px 24px;
            border-bottom: 1px solid #efe5db;
        }
        .day-badge {
            background: #e9e2d8;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #5c4b38;
        }
        .page-indicator {
            font-size: 0.8rem;
            color: #b78f64;
            font-weight: 500;
            background: #f7f2eb;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .reset-small {
            background: transparent;
            border: 1px solid #ddd0c0;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .page-content {
            flex: 1;
            padding: 32px 24px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }

        /* page 1 - minimal */
        .page1-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .chengyu-characters {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 12px;
            color: #2c241a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 20px;
        }
        .pinyin {
            font-size: 1.3rem;
            color: #b87c4f;
            letter-spacing: 2px;
        }

        /* page 2 */
        .char-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .char-row {
            background: #faf7f2;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #ede3d7;
        }
        .char-big {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            min-width: 56px;
            color: #2c241a;
        }
        .char-pinyin {
            font-size: 0.8rem;
            color: #b87c4f;
            min-width: 65px;
        }
        .char-translation {
            flex: 1;
            font-size: 0.9rem;
            color: #5c4b38;
        }
        .meaning-summary {
            margin-top: 20px;
            background: #efe7dd;
            border-radius: 20px;
            padding: 14px;
            font-size: 0.9rem;
        }

        /* page 3 quiz */
        .quiz-scenario {
            background: #f5efe8;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .scenario-text {
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .quiz-choice {
            background: white;
            border: 1.5px solid #e3d8ce;
            border-radius: 60px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .quiz-choice.selected {
            background: #e0cfbc;
            border-color: #b2824a;
        }
        .quiz-choice.correct-highlight {
            background: #c8e0c8;
            border-color: #4a7c4a;
        }
        .quiz-choice.wrong-highlight {
            background: #f0d8d8;
            border-color: #c97a7a;
        }
        .feedback-msg {
            margin-top: 10px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        button {
            background: #e0cfbc;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.97);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px 24px 24px;
            border-top: 1px solid #efe5db;
            background: white;
            gap: 10px;
        }
        .nav-arrow {
            background: #f0e8df;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 500;
            color: #5c4b38;
            flex: 1;
            text-align: center;
        }
        .next-day-btn {
            background: #c9aa7b;
            color: white;
            flex: 1;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            padding: 12px;
            color: #bcab98;
            border-top: 1px solid #efe5db;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="day-badge" id="dayCounter">第 1 天</div>
        <div class="page-indicator" id="pageIndicator">① 成语</div>
        <button id="resetBtn" class="reset-small">↺ 重置</button>
    </div>

    <div class="page-content" id="pageContent"></div>

    <div class="nav-buttons">
        <button class="nav-arrow" id="prevPageBtn">← 上一页</button>
        <button class="nav-arrow" id="nextPageBtn">下一页 →</button>
        <button class="next-day-btn" id="nextDayBtn">✨ 下一天</button>
    </div>
    <footer>① 成语 ② 逐字解义 ③ 场景测验</footer>
</div>

<script>
    const CHENGYU_SET = [
        {
            chengyu: "画蛇添足",
            pinyin: "huà shé tiān zú",
            literalTranslation: "Draw a snake, add feet",
            simpleMeaning: "To overdo something and ruin it",
            breakdown: [
                { char: "画", pinyin: "huà", english: "to draw/paint" },
                { char: "蛇", pinyin: "shé", english: "snake" },
                { char: "添", pinyin: "tiān", english: "to add" },
                { char: "足", pinyin: "zú", english: "foot/feet" }
            ],
            scenarios: [
                { text: "一个产品本来已经很好了，团队非要加很多没用的功能，结果用户体验变差。", correct: "画蛇添足" },
                { text: "他本来演讲已经很完美了，却额外加了一堆笑话，反而冷场了。", correct: "画蛇添足" },
                { text: "她认真准备了考试，最后取得了好成绩。", correct: "画蛇添足" }
            ]
        },
        {
            chengyu: "对牛弹琴",
            pinyin: "duì niú tán qín",
            literalTranslation: "To play the lute to a cow",
            simpleMeaning: "Talking to someone who doesn't understand",
            breakdown: [
                { char: "对", pinyin: "duì", english: "to/towards" },
                { char: "牛", pinyin: "niú", english: "cow/ox" },
                { char: "弹", pinyin: "tán", english: "to play (instrument)" },
                { char: "琴", pinyin: "qín", english: "string instrument" }
            ],
            scenarios: [
                { text: "你给一个从不看书的人讲文学理论，讲了半天他毫无反应。", correct: "对牛弹琴" },
                { text: "老师向认真学习的学生讲解难题，学生很快理解了。", correct: "对牛弹琴" },
                { text: "他在音乐会上演奏了一首名曲，观众热烈鼓掌。", correct: "对牛弹琴" }
            ]
        },
        {
            chengyu: "守株待兔",
            pinyin: "shǒu zhū dài tù",
            literalTranslation: "Guard the stump, wait for rabbits",
            simpleMeaning: "Waiting for luck instead of working",
            breakdown: [
                { char: "守", pinyin: "shǒu", english: "to guard/wait" },
                { char: "株", pinyin: "zhū", english: "tree stump" },
                { char: "待", pinyin: "dài", english: "to wait for" },
                { char: "兔", pinyin: "tù", english: "rabbit" }
            ],
            scenarios: [
                { text: "他上次靠运气通过考试，这次又不好好复习，指望再走运。", correct: "守株待兔" },
                { text: "农民每天勤奋种地，秋天丰收了。", correct: "守株待兔" },
                { text: "公司不创新，只等老客户上门，生意越来越差。", correct: "守株待兔" }
            ]
        },
        {
            chengyu: "井底之蛙",
            pinyin: "jǐng dǐ zhī wā",
            literalTranslation: "Frog at the bottom of a well",
            simpleMeaning: "Narrow-minded, lacking perspective",
            breakdown: [
                { char: "井", pinyin: "jǐng", english: "well" },
                { char: "底", pinyin: "dǐ", english: "bottom" },
                { char: "之", pinyin: "zhī", english: "of/'s" },
                { char: "蛙", pinyin: "wā", english: "frog" }
            ],
            scenarios: [
                { text: "某人认为自己的小城市就是全世界最好的地方，从没见过其他地方。", correct: "井底之蛙" },
                { text: "一位环球旅行家分享各地文化，大家都很受益。", correct: "井底之蛙" },
                { text: "她只懂自己的专业，对其他领域一无所知还看不起别人。", correct: "井底之蛙" }
            ]
        },
        {
            chengyu: "未雨绸缪",
            pinyin: "wèi yǔ chóu móu",
            literalTranslation: "Before rain, bind (the windows)",
            simpleMeaning: "Prepare in advance",
            breakdown: [
                { char: "未", pinyin: "wèi", english: "not yet" },
                { char: "雨", pinyin: "yǔ", english: "rain" },
                { char: "绸缪", pinyin: "chóu móu", english: "to bind/tie up (prepare)" }
            ],
            scenarios: [
                { text: "他每个月存一部分工资，以防将来生病或失业。", correct: "未雨绸缪" },
                { text: "台风要来之前，他家提前加固了窗户。", correct: "未雨绸缪" },
                { text: "他花光了所有钱，结果生病时没钱看病。", correct: "未雨绸缪" }
            ]
        }
    ];

    let currentDay = 0;
    let currentPage = 0;
    let quizAnswers = [];

    const DAY_KEY = "chengyu3_day";
    const DATE_KEY = "chengyu3_date";

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function loadProgress() {
        let savedDay = localStorage.getItem(DAY_KEY);
        let savedDate = localStorage.getItem(DATE_KEY);
        let today = getToday();
        if (!savedDay || !savedDate) {
            currentDay = 0;
            localStorage.setItem(DAY_KEY, "0");
            localStorage.setItem(DATE_KEY, today);
            return;
        }
        if (savedDate === today) {
            currentDay = parseInt(savedDay, 10) % CHENGYU_SET.length;
        } else {
            let newDay = (parseInt(savedDay, 10) + 1) % CHENGYU_SET.length;
            localStorage.setItem(DAY_KEY, newDay.toString());
            localStorage.setItem(DATE_KEY, today);
            currentDay = newDay;
        }
    }

    function renderPage() {
        const c = CHENGYU_SET[currentDay];
        const container = document.getElementById("pageContent");
        const pageIndicator = document.getElementById("pageIndicator");
        
        if (currentPage === 0) {
            pageIndicator.innerText = "① 成语";
            container.innerHTML = `
                <div class="page1-center">
                    <div class="chengyu-characters">${c.chengyu}</div>
                    <div class="pinyin">${c.pinyin}</div>
                </div>
            `;
        } 
        else if (currentPage === 1) {
            pageIndicator.innerText = "② 逐字解义";
            let charsHtml = `<div class="char-grid">`;
            c.breakdown.forEach(item => {
                charsHtml += `
                    <div class="char-row">
                        <span class="char-big">${item.char}</span>
                        <span class="char-pinyin">${item.pinyin}</span>
                        <span class="char-translation">${item.english}</span>
                    </div>
                `;
            });
            charsHtml += `</div>`;
            charsHtml += `<div class="meaning-summary">
                            📖 字面: “${c.literalTranslation}”<br>
                            🎯 比喻: ${c.simpleMeaning}
                        </div>`;
            container.innerHTML = charsHtml;
        } 
        else {
            pageIndicator.innerText = "③ 场景测验";
            if (quizAnswers.length !== c.scenarios.length) {
                quizAnswers = new Array(c.scenarios.length).fill(null);
            }
            let quizHtml = `<div style="margin-bottom:12px;"><strong>📋 哪个场景最适合用 “${c.chengyu}”？</strong></div>`;
            c.scenarios.forEach((scenario, idx) => {
                let selected = quizAnswers[idx];
                let otherChengyus = CHENGYU_SET.filter((_, i) => i !== currentDay).map(c => c.chengyu).slice(0,2);
                while(otherChengyus.length < 2) otherChengyus.push("一心一意");
                let options = [c.chengyu, ...otherChengyus].sort(() => Math.random() - 0.5);
                
                quizHtml += `<div class="quiz-scenario" data-idx="${idx}">
                                <div class="scenario-text">📖 ${scenario.text}</div>
                                <div class="quiz-options">`;
                options.forEach(opt => {
                    let isSelected = (selected === opt);
                    let extraClass = "";
                    if (selected !== null) {
                        if (opt === scenario.correct) extraClass = "correct-highlight";
                        if (selected === opt && opt !== scenario.correct) extraClass = "wrong-highlight";
                    }
                    quizHtml += `<div class="quiz-choice ${isSelected ? 'selected' : ''} ${extraClass}" data-opt="${opt}">${opt}</div>`;
                });
                quizHtml += `</div>`;
                if (selected !== null) {
                    if (selected === scenario.correct) quizHtml += `<div class="feedback-msg" style="color:#2a6b3c;">✅ 正确</div>`;
                    else quizHtml += `<div class="feedback-msg" style="color:#b13e3e;">❌ 正确答案: ${scenario.correct}</div>`;
                }
                quizHtml += `</div>`;
            });
            let allAnswered = quizAnswers.every(a => a !== null);
            if (allAnswered) {
                quizHtml += `<button id="resetQuizBtn" style="margin-top:8px;">🔄 重做测验</button>`;
            }
            container.innerHTML = quizHtml;
            
            document.querySelectorAll('.quiz-choice').forEach(el => {
                el.addEventListener('click', (e) => {
                    let scenarioDiv = el.closest('.quiz-scenario');
                    let idx = parseInt(scenarioDiv.dataset.idx);
                    if (quizAnswers[idx] !== null) return;
                    let selectedOpt = el.dataset.opt;
                    quizAnswers[idx] = selectedOpt;
                    renderPage();
                });
            });
            const resetBtn = document.getElementById("resetQuizBtn");
            if (resetBtn) resetBtn.onclick = () => {
                quizAnswers = new Array(c.scenarios.length).fill(null);
                renderPage();
            };
        }
    }

    function refreshAll() {
        document.getElementById("dayCounter").innerText = `第 ${currentDay+1} 天`;
        renderPage();
    }

    function nextPage() { if (currentPage < 2) { currentPage++; renderPage(); } }
    function prevPage() { if (currentPage > 0) { currentPage--; renderPage(); } }
    function nextDay() {
        let newDay = (currentDay + 1) % CHENGYU_SET.length;
        currentDay = newDay;
        localStorage.setItem(DAY_KEY, currentDay.toString());
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        refreshAll();
    }
    function resetProgress() {
        currentDay = 0;
        localStorage.setItem(DAY_KEY, "0");
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        refreshAll();
    }

    loadProgress();
    refreshAll();

    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("nextPageBtn").onclick = nextPage;
    document.getElementById("nextDayBtn").onclick = nextDay;
    document.getElementById("resetBtn").onclick = resetProgress;
</script>
</body>
</html>
