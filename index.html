<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>每日成语 · 一字一故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Noto Sans CJK SC', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f5f3f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        /* main card */
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
            padding: 32px 24px 40px;
            transition: all 0.2s ease;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .day-badge {
            background: #e9e5df;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a3b2c;
        }
        .streak {
            font-size: 0.85rem;
            color: #b87c4f;
            font-weight: 500;
        }

        /* chengyu main area */
        .chengyu-block {
            text-align: center;
            margin: 24px 0 16px;
        }
        .chengyu-characters {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 8px;
            color: #2c241a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 12px;
        }
        .pinyin {
            font-size: 1.2rem;
            color: #b87c4f;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* button */
        .btn-details {
            background: none;
            border: 1.5px solid #ddd6cd;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #4a3b2c;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin: 20px 0 16px;
            background: white;
        }
        .btn-details:active {
            background: #f5f0ea;
            transform: scale(0.97);
        }

        /* details panel (hidden initially) */
        .details-panel {
            background: #faf7f2;
            border-radius: 32px;
            padding: 20px;
            margin-top: 8px;
            display: none;
        }
        .details-panel.show {
            display: block;
        }

        .meaning {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c4b2c;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2d9cf;
            margin-bottom: 16px;
        }

        .char-breakdown {
            margin: 16px 0;
        }
        .char-item {
            background: white;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid #ede5db;
        }
        .char-chinese {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            color: #2c241a;
            min-width: 56px;
        }
        .char-pinyin-small {
            font-size: 0.8rem;
            color: #b87c4f;
            font-weight: 500;
            min-width: 70px;
        }
        .char-meaning {
            color: #5a4a38;
            font-size: 0.9rem;
            flex: 1;
        }

        .example-sentence {
            background: #efe7dd;
            border-radius: 20px;
            padding: 14px 16px;
            margin-top: 16px;
            font-size: 0.9rem;
            color: #3d3224;
        }
        .example-translation {
            font-size: 0.8rem;
            color: #8f7358;
            margin-top: 6px;
        }

        /* quiz area */
        .quiz-area {
            margin-top: 28px;
            border-top: 1px solid #ede0d2;
            padding-top: 20px;
        }
        .quiz-question {
            font-weight: 600;
            margin-bottom: 12px;
            color: #3a2c1c;
        }
        .quiz-option {
            background: #fefcf8;
            border: 1px solid #e7dfd5;
            border-radius: 60px;
            padding: 12px 18px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.1s;
        }
        .quiz-option.selected {
            background: #e0d3c2;
            border-color: #b2824a;
        }
        button.quiz-submit, button.next-btn, .finish-btn {
            background: #e0cfbc;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            margin-top: 12px;
            font-weight: 500;
        }
        .feedback {
            margin: 12px 0;
            font-weight: 500;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #ddd0c0;
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #8f7358;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            color: #bcab98;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="header">
        <div class="day-badge" id="dayCounter">第 1 天</div>
        <div class="streak">📖 每日一成语</div>
    </div>

    <div class="chengyu-block">
        <div class="chengyu-characters" id="chengyuChars">画蛇添足</div>
        <div class="pinyin" id="pinyinDisplay">huà shé tiān zú</div>
    </div>

    <button class="btn-details" id="toggleDetailsBtn">📖 查看详解 + 单字释义</button>

    <div class="details-panel" id="detailsPanel">
        <div class="meaning" id="meaningDisplay"></div>
        <div class="char-breakdown" id="charBreakdown"></div>
        <div class="example-sentence">
            <div id="exampleCh"></div>
            <div class="example-translation" id="exampleEn"></div>
        </div>
    </div>

    <div id="quizContainer" class="quiz-area"></div>

    <div style="display: flex; justify-content: center;">
        <button id="nextDayBtn" class="reset-btn" style="margin-right:8px;">✨ 学下一个成语</button>
        <button id="resetProgressBtn" class="reset-btn">🔄 重置</button>
    </div>
    <footer>每3天小测验 · 点击单字看释义</footer>
</div>

<script>
    // ----- enriched chengyu data with character breakdowns -----
    const CHENGYU_DATA = [
        { 
            chengyu: "画蛇添足", pinyin: "huà shé tiān zú", 
            meaning: "比喻多此一举，弄巧成拙。",
            breakdown: [
                { char: "画", pinyin: "huà", meaning: "绘画、描画" },
                { char: "蛇", pinyin: "shé", meaning: "爬行动物，蛇" },
                { char: "添", pinyin: "tiān", meaning: "添加、增加" },
                { char: "足", pinyin: "zú", meaning: "脚" }
            ],
            example_ch: "写文章贵在简洁，不要画蛇添足。", 
            example_en: "Don't gild the lily when writing an essay." 
        },
        { 
            chengyu: "对牛弹琴", pinyin: "duì niú tán qín", 
            meaning: "比喻说话不看对象，徒劳无功。",
            breakdown: [
                { char: "对", pinyin: "duì", meaning: "面向、对待" },
                { char: "牛", pinyin: "niú", meaning: "牛" },
                { char: "弹", pinyin: "tán", meaning: "弹奏" },
                { char: "琴", pinyin: "qín", meaning: "乐器，琴" }
            ],
            example_ch: "跟他讲量子物理简直是对牛弹琴。", 
            example_en: "Explaining quantum physics to him is like casting pearls before swine." 
        },
        { 
            chengyu: "守株待兔", pinyin: "shǒu zhū dài tù", 
            meaning: "死守狭隘经验，不知变通。",
            breakdown: [
                { char: "守", pinyin: "shǒu", meaning: "守候、看守" },
                { char: "株", pinyin: "zhū", meaning: "树桩" },
                { char: "待", pinyin: "dài", meaning: "等待" },
                { char: "兔", pinyin: "tù", meaning: "兔子" }
            ],
            example_ch: "不要守株待兔，要主动创新。", 
            example_en: "Don't wait for luck; be proactive." 
        },
        { 
            chengyu: "亡羊补牢", pinyin: "wáng yáng bǔ láo", 
            meaning: "出了差错及时补救，还不算晚。",
            breakdown: [
                { char: "亡", pinyin: "wáng", meaning: "丢失、逃亡" },
                { char: "羊", pinyin: "yáng", meaning: "羊" },
                { char: "补", pinyin: "bǔ", meaning: "修补" },
                { char: "牢", pinyin: "láo", meaning: "牲口圈" }
            ],
            example_ch: "这次失败后亡羊补牢，下次就能避免。", 
            example_en: "It's never too late to mend." 
        },
        { 
            chengyu: "井底之蛙", pinyin: "jǐng dǐ zhī wā", 
            meaning: "比喻眼界狭窄，见识短浅。",
            breakdown: [
                { char: "井", pinyin: "jǐng", meaning: "水井" },
                { char: "底", pinyin: "dǐ", meaning: "底部" },
                { char: "之", pinyin: "zhī", meaning: "的" },
                { char: "蛙", pinyin: "wā", meaning: "青蛙" }
            ],
            example_ch: "多出去看看世界，别做井底之蛙。", 
            example_en: "Don't be a frog in a well." 
        }
    ];

    // extend to at least 15 entries (keeping original richer set but simplified for this demo – add more)
    const EXTRA = [
        { chengyu: "掩耳盗铃", pinyin: "yǎn ěr dào líng", meaning: "自欺欺人。", breakdown: [{char:"掩",pinyin:"yǎn",meaning:"捂住"},{char:"耳",pinyin:"ěr",meaning:"耳朵"},{char:"盗",pinyin:"dào",meaning:"偷"},{char:"铃",pinyin:"líng",meaning:"铃铛"}], example_ch: "作弊就是掩耳盗铃。", example_en: "Deceiving yourself." },
        { chengyu: "愚公移山", pinyin: "yú gōng yí shān", meaning: "坚持不懈改造自然。", breakdown: [{char:"愚",pinyin:"yú",meaning:"愚笨"},{char:"公",pinyin:"gōng",meaning:"老人"},{char:"移",pinyin:"yí",meaning:"移动"},{char:"山",pinyin:"shān",meaning:"山"}], example_ch: "科研需要愚公移山的精神。", example_en: "Perseverance moves mountains." },
        { chengyu: "未雨绸缪", pinyin: "wèi yǔ chóu móu", meaning: "提前准备，防患未然。", breakdown: [{char:"未",pinyin:"wèi",meaning:"还没有"},{char:"雨",pinyin:"yǔ",meaning:"下雨"},{char:"绸缪",pinyin:"chóu móu",meaning:"紧密缠缚，引申为准备"}], example_ch: "存钱是为了未雨绸缪。", example_en: "Save for a rainy day." }
    ];
    const FULL_SET = [...CHENGYU_DATA, ...EXTRA];

    // storage keys
    const STORAGE_DAY = "chengyu_idx";
    const LAST_DATE = "chengyu_lastdate";

    let currentIdx = 0;
    let showDetails = false;
    let quizMode = false, quizList = [], quizStep = 0, userChoice = [], quizSubmitted = false;

    // helpers
    function getTodayStr() {
        let d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function loadDay() {
        let stored = localStorage.getItem(STORAGE_DAY);
        let last = localStorage.getItem(LAST_DATE);
        let today = getTodayStr();
        if (!stored || !last) {
            currentIdx = 0;
            localStorage.setItem(STORAGE_DAY, "0");
            localStorage.setItem(LAST_DATE, today);
            return;
        }
        if (last === today) {
            currentIdx = parseInt(stored, 10) % FULL_SET.length;
        } else {
            let newIdx = (parseInt(stored, 10) + 1) % FULL_SET.length;
            localStorage.setItem(STORAGE_DAY, newIdx.toString());
            localStorage.setItem(LAST_DATE, today);
            currentIdx = newIdx;
            showDetails = false;
            quizMode = false;
        }
    }

    function renderChengyu() {
        const c = FULL_SET[currentIdx];
        document.getElementById("chengyuChars").innerText = c.chengyu;
        document.getElementById("pinyinDisplay").innerText = c.pinyin;
        document.getElementById("dayCounter").innerText = `第 ${currentIdx+1} 天`;
        document.getElementById("meaningDisplay").innerText = c.meaning;
        document.getElementById("exampleCh").innerText = c.example_ch;
        document.getElementById("exampleEn").innerText = c.example_en;
        // breakdown
        let breakdownHtml = "";
        for (let part of c.breakdown) {
            breakdownHtml += `
                <div class="char-item">
                    <span class="char-chinese">${part.char}</span>
                    <span class="char-pinyin-small">${part.pinyin}</span>
                    <span class="char-meaning">${part.meaning}</span>
                </div>
            `;
        }
        document.getElementById("charBreakdown").innerHTML = breakdownHtml;
    }

    function toggleDetails() {
        showDetails = !showDetails;
        const panel = document.getElementById("detailsPanel");
        if (showDetails) panel.classList.add("show");
        else panel.classList.remove("show");
    }

    // quiz generation (based on already learned, up to currentIdx)
    function generateQuiz() {
        let learnedCount = Math.min(currentIdx+1, FULL_SET.length);
        if (learnedCount < 2) return [];
        let indices = [];
        let start = Math.max(0, currentIdx-4);
        for (let i=start; i<=currentIdx; i++) indices.push(i);
        let pool = [];
        for (let idx of indices) {
            let item = FULL_SET[idx];
            let type = Math.random() > 0.5 ? "meaning2chengyu" : "chengyu2meaning";
            let question, correctAns, opts;
            if (type === "meaning2chengyu") {
                question = `“${item.meaning}” 对应的成语是？`;
                correctAns = item.chengyu;
                let others = FULL_SET.filter((_,i) => i !== idx).map(c => c.chengyu);
                let candidates = [...new Set(others)].slice(0,3);
                while(candidates.length < 3) candidates.push("一心一意");
                opts = [correctAns, ...candidates].sort(() => Math.random() - 0.5);
            } else {
                question = `“${item.chengyu}” 的正确意思是？`;
                correctAns = item.meaning;
                let others = FULL_SET.filter((_,i) => i !== idx).map(c => c.meaning);
                let candidates = [...new Set(others)].slice(0,3);
                while(candidates.length < 3) candidates.push("坚持不懈");
                opts = [correctAns, ...candidates].sort(() => Math.random() - 0.5);
            }
            pool.push({question, options: opts, correct: correctAns, idx});
        }
        return pool.sort(() => Math.random() - 0.5).slice(0, 4);
    }

    function renderQuiz() {
        const container = document.getElementById("quizContainer");
        if (!quizMode || quizList.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:12px 0;">✨ 每3天一次小测验，巩固记忆</div>`;
            return;
        }
        let q = quizList[quizStep];
        let html = `<div class="quiz-question">📝 小测验 (${quizStep+1}/${quizList.length})</div>`;
        html += `<div class="quiz-question">❓ ${q.question}</div>`;
        q.options.forEach((opt, i) => {
            let selectedClass = (userChoice[quizStep] === i) ? "selected" : "";
            html += `<div class="quiz-option ${selectedClass}" data-opt-index="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`;
        });
        if (userChoice[quizStep] !== undefined && !quizSubmitted) {
            html += `<button class="quiz-submit" id="submitQuizBtn">✓ 提交</button>`;
        }
        if (quizSubmitted) {
            let isCorrect = (q.options[userChoice[quizStep]] === q.correct);
            html += `<div class="feedback" style="color:${isCorrect ? '#2a6b3c' : '#b13e3e'}">${isCorrect ? '✔️ 答对了！' : '❌ 正确答案: ' + q.correct}</div>`;
            if (quizStep+1 < quizList.length) html += `<button class="next-btn" id="nextQuizBtn">下一题 →</button>`;
            else html += `<button class="finish-btn" id="finishQuizBtn">🎉 完成测验</button>`;
        }
        container.innerHTML = html;
        attachQuizEvents();
    }

    function attachQuizEvents() {
        document.querySelectorAll('.quiz-option').forEach(el => {
            el.onclick = (e) => {
                if (quizSubmitted) return;
                let idx = parseInt(el.dataset.optIndex);
                userChoice[quizStep] = idx;
                renderQuiz();
            };
        });
        let submit = document.getElementById("submitQuizBtn");
        if (submit) submit.onclick = () => { quizSubmitted = true; renderQuiz(); };
        let next = document.getElementById("nextQuizBtn");
        if (next) next.onclick = () => { quizStep++; quizSubmitted = false; renderQuiz(); };
        let finish = document.getElementById("finishQuizBtn");
        if (finish) finish.onclick = () => { quizMode = false; renderQuiz(); };
    }

    function checkAndStartQuiz() {
        let dayNumber = currentIdx+1;
        if (dayNumber % 3 === 0 && !quizMode) {
            let generated = generateQuiz();
            if (generated.length) {
                quizList = generated;
                quizStep = 0;
                userChoice = new Array(quizList.length).fill(undefined);
                quizSubmitted = false;
                quizMode = true;
                renderQuiz();
                return;
            }
        }
        renderQuiz();
    }

    function nextDay() {
        let newIdx = (currentIdx + 1) % FULL_SET.length;
        currentIdx = newIdx;
        localStorage.setItem(STORAGE_DAY, currentIdx.toString());
        localStorage.setItem(LAST_DATE, getTodayStr());
        showDetails = false;
        document.getElementById("detailsPanel").classList.remove("show");
        quizMode = false;
        renderChengyu();
        checkAndStartQuiz();
    }

    function resetAll() {
        currentIdx = 0;
        localStorage.setItem(STORAGE_DAY, "0");
        localStorage.setItem(LAST_DATE, getTodayStr());
        showDetails = false;
        document.getElementById("detailsPanel").classList.remove("show");
        quizMode = false;
        renderChengyu();
        checkAndStartQuiz();
    }

    // initialization
    loadDay();
    renderChengyu();
    checkAndStartQuiz();

    document.getElementById("toggleDetailsBtn").onclick = toggleDetails;
    document.getElementById("nextDayBtn").onclick = nextDay;
    document.getElementById("resetProgressBtn").onclick = resetAll;
</script>
</body>
</html>
