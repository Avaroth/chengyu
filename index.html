<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>每日成语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Noto Sans CJK SC', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f2efe9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 56px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .page-content {
            flex: 1;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
        }

        .page1-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .chengyu-characters {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #2c241a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 20px;
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }
        .pinyin {
            font-size: 1.3rem;
            color: #b87c4f;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .page2-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #efe5db;
        }
        .page2-chengyu {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #2c241a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 6px;
            white-space: nowrap;
        }
        .page2-pinyin {
            font-size: 0.85rem;
            color: #b87c4f;
        }
        .meaning-first {
            background: #efe7dd;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .literal-meaning {
            font-size: 0.9rem;
            color: #5c4b38;
            margin-bottom: 8px;
        }
        .simple-meaning {
            font-size: 1rem;
            font-weight: 600;
            color: #2c4b2c;
        }
        .char-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .char-row {
            background: #faf7f2;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #ede3d7;
        }
        .char-big {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            min-width: 52px;
            color: #2c241a;
        }
        .char-pinyin {
            font-size: 0.75rem;
            color: #b87c4f;
            min-width: 60px;
            font-weight: 500;
        }
        .char-translation {
            flex: 1;
            font-size: 0.85rem;
            color: #5c4b38;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .quiz-header-chengyu {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c241a;
            margin-bottom: 8px;
        }
        .quiz-header-pinyin {
            font-size: 0.85rem;
            color: #b87c4f;
        }
        .quiz-subheader {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #8f7358;
        }
        .scenario-card {
            background: #f5efe8;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .scenario-text {
            font-size: 1rem;
            line-height: 1.45;
            margin-bottom: 18px;
        }
        .yesno-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .yesno-btn {
            background: white;
            border: 2px solid #e3d8ce;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            flex: 1;
            max-width: 100px;
        }
        .yesno-btn:active {
            transform: scale(0.95);
        }
        .yesno-btn.selected-correct {
            background: #c8e0c8;
            border-color: #4a7c4a;
            color: #2a5a2a;
        }
        .yesno-btn.selected-wrong {
            background: #f0d8d8;
            border-color: #c97a7a;
            color: #8b3a3a;
        }
        .feedback-msg {
            margin-top: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }
        .reset-quiz-btn {
            background: #e0cfbc;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .reset-quiz-btn:active {
            transform: scale(0.97);
        }

        .nav-arrows {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 24px 12px 24px;
            border-top: 1px solid #efe5db;
            background: white;
        }
        .nav-arrow {
            background: #f0e8df;
            border: none;
            border-radius: 60px;
            padding: 20px 0;
            font-size: 2.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .nav-arrow:active {
            transform: scale(0.96);
            background: #e0d5c8;
        }
        .nav-arrow.green {
            background: #4caf50;
            color: white;
        }
        .nav-actions {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 8px 24px 24px 24px;
            background: white;
        }
        .action-btn {
            background: #e0cfbc;
            border: none;
            border-radius: 60px;
            padding: 16px 0;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: #d0c0ab;
        }
        .skip-btn {
            background: #c9aa7b;
            color: white;
        }

        @media (max-width: 400px) {
            .chengyu-characters {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
            .page2-chengyu {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .nav-arrow {
                font-size: 1.8rem;
                padding: 16px 0;
            }
            .action-btn {
                font-size: 1.5rem;
                padding: 14px 0;
            }
            .yesno-btn {
                font-size: 1.5rem;
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="page-content" id="pageContent"></div>

    <div class="nav-arrows">
        <button class="nav-arrow" id="prevPageBtn">←</button>
        <button class="nav-arrow" id="nextPageBtn">→</button>
    </div>
    
    <div class="nav-actions" id="navActions">
        <button class="action-btn" id="resetBottomBtn">↺</button>
    </div>
</div>

<script src="chengyu-data.js"></script>
<script>
    let currentDay = 0;
    let currentPage = 0;
    let quizAnswers = [];

    const DAY_KEY = "chengyu3_day";
    const DATE_KEY = "chengyu3_date";

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function loadProgress() {
        let savedDay = localStorage.getItem(DAY_KEY);
        let savedDate = localStorage.getItem(DATE_KEY);
        let today = getToday();
        if (!savedDay || !savedDate) {
            currentDay = Math.floor(Math.random() * CHENGYU_SET.length);
            localStorage.setItem(DAY_KEY, currentDay.toString());
            localStorage.setItem(DATE_KEY, today);
            return;
        }
        if (savedDate === today) {
            currentDay = parseInt(savedDay, 10) % CHENGYU_SET.length;
        } else {
            let newDay = (parseInt(savedDay, 10) + 1) % CHENGYU_SET.length;
            localStorage.setItem(DAY_KEY, newDay.toString());
            localStorage.setItem(DATE_KEY, today);
            currentDay = newDay;
        }
    }

    function renderPage() {
        const c = CHENGYU_SET[currentDay];
        const container = document.getElementById("pageContent");
        
        if (currentPage === 0) {
            container.innerHTML = `
                <div class="page1-center">
                    <div class="chengyu-characters">${c.chengyu}</div>
                    <div class="pinyin">${c.pinyin}</div>
                </div>
            `;
        } 
        else if (currentPage === 1) {
            container.innerHTML = `
                <div class="page2-header">
                    <div class="page2-chengyu">${c.chengyu}</div>
                    <div class="page2-pinyin">${c.pinyin}</div>
                </div>
                <div class="meaning-first">
                    <div class="literal-meaning">📖 字面: ${c.literalTranslation}</div>
                    <div class="simple-meaning">🎯 比喻: ${c.simpleMeaning}</div>
                </div>
                <div class="char-grid">
                    ${c.breakdown.map(item => `
                        <div class="char-row">
                            <span class="char-big">${item.char}</span>
                            <span class="char-pinyin">${item.pinyin}</span>
                            <span class="char-translation">${item.english}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        } 
        else {
            if (quizAnswers.length !== c.scenarios.length) {
                quizAnswers = new Array(c.scenarios.length).fill(null);
            }
            
            let quizHtml = `
                <div class="quiz-header">
                    <div class="quiz-header-chengyu">${c.chengyu}</div>
                    <div class="quiz-header-pinyin">${c.pinyin}</div>
                    <div class="quiz-subheader">适合这个成语吗？</div>
                </div>
            `;
            
            c.scenarios.forEach((scenario, idx) => {
                let answer = quizAnswers[idx];
                let isCorrect = (answer !== null && answer === scenario.correct);
                let isWrong = (answer !== null && answer !== scenario.correct);
                
                quizHtml += `<div class="scenario-card" data-idx="${idx}">
                                <div class="scenario-text">📖 ${scenario.text}</div>
                                <div class="yesno-buttons">
                                    <div class="yesno-btn ${answer !== null && answer === true ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="true">✓</div>
                                    <div class="yesno-btn ${answer !== null && answer === false ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="false">✗</div>
                                </div>`;
                
                if (answer !== null) {
                    if (isCorrect) {
                        quizHtml += `<div class="feedback-msg" style="color:#2a6b3c;">✓ 正确</div>`;
                    } else {
                        quizHtml += `<div class="feedback-msg" style="color:#b13e3e;">✗ ${scenario.correct ? '这其实是适合的' : '其实不适合'}</div>`;
                    }
                }
                quizHtml += `</div>`;
            });
            
            let allAnswered = quizAnswers.every(a => a !== null);
            if (allAnswered) {
                quizHtml += `<button class="reset-quiz-btn" id="resetQuizBtn">⟳ 重做</button>`;
            }
            
            container.innerHTML = quizHtml;
            
            document.querySelectorAll('.scenario-card').forEach(card => {
                const idx = parseInt(card.dataset.idx);
                card.querySelectorAll('.yesno-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (quizAnswers[idx] !== null) return;
                        const choice = btn.dataset.choice === 'true';
                        quizAnswers[idx] = choice;
                        renderPage();
                    });
                });
            });
            
            const resetBtn = document.getElementById("resetQuizBtn");
            if (resetBtn) resetBtn.onclick = () => {
                quizAnswers = new Array(c.scenarios.length).fill(null);
                renderPage();
            };
        }
        
        updateNavVisibility();
    }

    function updateNavVisibility() {
        const nextArrow = document.getElementById("nextPageBtn");
        const navActions = document.getElementById("navActions");
        
        if (currentPage === 2) {
            // On page 3: hide skip button, make forward arrow green, go to next chengyu
            navActions.innerHTML = `<button class="action-btn" id="resetBottomBtn">↺</button>`;
            nextArrow.classList.add("green");
            // Change behavior: forward arrow goes to next chengyu (page 0)
            const oldNextHandler = nextArrow.onclick;
            nextArrow.onclick = () => {
                nextDay();
            };
        } else {
            // On pages 1-2: normal navigation
            navActions.innerHTML = `<button class="action-btn" id="resetBottomBtn">↺</button>`;
            nextArrow.classList.remove("green");
            nextArrow.onclick = () => {
                if (currentPage < 2) {
                    currentPage++;
                    renderPage();
                }
            };
        }
        
        // Reattach reset button handler
        document.getElementById("resetBottomBtn").onclick = resetProgress;
    }

    function nextDay() {
        let newDay = (currentDay + 1) % CHENGYU_SET.length;
        currentDay = newDay;
        localStorage.setItem(DAY_KEY, currentDay.toString());
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }
    
    function prevPage() { 
        if (currentPage > 0) { 
            currentPage--; 
            renderPage(); 
        } 
    }
    
    function resetProgress() {
        currentDay = 0;
        localStorage.setItem(DAY_KEY, "0");
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }

    loadProgress();
    renderPage();

    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("resetBottomBtn").onclick = resetProgress;
</script>
</body>
</html>
