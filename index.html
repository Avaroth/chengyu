<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>每日成语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Noto Sans CJK SC', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #fdf6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px -12px rgba(160, 80, 60, 0.15);
            overflow: hidden;
            height: 85vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* progress header - compact */
        .progress-header {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #f0dfd2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .progress-text {
            font-size: 0.8rem;
            color: #b88a6a;
            font-weight: 500;
        }
        .completed-badge {
            background: #c8dcc8;
            color: #4a6a3a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* content area - NO top padding, NO centering */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 20px 24px;
            scroll-behavior: smooth;
        }

        .page-content::-webkit-scrollbar {
            width: 4px;
        }
        .page-content::-webkit-scrollbar-track {
            background: #f5ede5;
            border-radius: 10px;
        }
        .page-content::-webkit-scrollbar-thumb {
            background: #d4a58c;
            border-radius: 10px;
        }

        /* page 0 - no centering, start from top */
        .page1-center {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 20px 0 0 0;
        }
        .chengyu-characters {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #8b3a2a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 20px;
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }
        .pinyin {
            font-size: 1.3rem;
            color: #c47a5a;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .completed-check {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #4a6a3a;
            background: #e0ebd8;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-block;
        }

        .page2-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 8px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0e0d4;
        }
        .title-with-audio {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .page2-chengyu {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #8b3a2a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            white-space: nowrap;
        }
        .page2-pinyin {
            font-size: 0.85rem;
            color: #c47a5a;
        }
        .meaning-first {
            background: #fff5ef;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            border-left: 4px solid #e8b89a;
        }
        .literal-meaning {
            font-size: 0.9rem;
            color: #8b6b5a;
            margin-bottom: 8px;
        }
        .simple-meaning {
            font-size: 1rem;
            font-weight: 600;
            color: #b85a3a;
        }
        .char-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .char-row {
            background: #fffaf5;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #f0dfd2;
        }
        .char-big {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            min-width: 52px;
            color: #8b3a2a;
        }
        .char-pinyin {
            font-size: 0.75rem;
            color: #c47a5a;
            min-width: 60px;
            font-weight: 500;
        }
        .char-translation {
            flex: 1;
            font-size: 0.85rem;
            color: #8b6b5a;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 8px;
        }
        .quiz-header-chengyu {
            font-size: 1.8rem;
            font-weight: 600;
            color: #8b3a2a;
            margin-bottom: 8px;
        }
        .quiz-header-pinyin {
            font-size: 0.85rem;
            color: #c47a5a;
        }
        .quiz-subheader {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #b88a6a;
        }
        .scenario-card {
            background: #fff5ef;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #f0dfd2;
        }
        .scenario-text {
            font-size: 1rem;
            line-height: 1.45;
            margin-bottom: 18px;
            color: #5a3a2a;
        }
        .yesno-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .yesno-btn {
            background: white;
            border: 2px solid #e8cfbe;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            flex: 1;
            max-width: 100px;
            color: #c47a5a;
        }
        .yesno-btn:active {
            transform: scale(0.95);
        }
        .yesno-btn.selected-correct {
            background: #e8d5c4;
            border-color: #b85a3a;
            color: #8b3a2a;
        }
        .yesno-btn.selected-wrong {
            background: #f0dbd0;
            border-color: #d49a7a;
            color: #b85a3a;
        }
        .feedback-msg {
            margin-top: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }
        .reset-quiz-btn {
            background: #f0dfd2;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            color: #8b3a2a;
        }
        .reset-quiz-btn:active {
            transform: scale(0.97);
        }

        .nav-arrows {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px 12px 20px;
            border-top: 1px solid #f0dfd2;
            background: white;
            flex-shrink: 0;
        }
        .nav-arrow {
            background: #f5ede5;
            border: none;
            border-radius: 60px;
            padding: 18px 0;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #b87a5a;
            transition: all 0.1s ease;
        }
        .nav-arrow:active {
            transform: scale(0.96);
            background: #e8d9cf;
        }
        .nav-arrow.green {
            background: #e8c4b0;
            color: #8b3a2a;
        }
        
        .nav-actions {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 20px 20px 20px;
            background: white;
            flex-shrink: 0;
        }
        .action-btn {
            background: #f0dfd2;
            border: none;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #8b3a2a;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: #e4cfbf;
        }

        /* Audio button styles */
        .audio-icon-btn {
            background: #f0dfd2;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.4rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            color: #8b3a2a;
            flex-shrink: 0;
        }
        .audio-icon-btn:active {
            transform: scale(0.92);
            background: #e4cfbf;
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        @media (max-width: 400px) {
            .chengyu-characters {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
            .page2-chengyu {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .nav-arrow {
                font-size: 1.6rem;
                padding: 14px 0;
            }
            .action-btn {
                font-size: 1.3rem;
                padding: 12px 0;
            }
            .yesno-btn {
                font-size: 1.4rem;
                padding: 10px 0;
            }
            .progress-header {
                padding: 8px 16px;
            }
            .page-content {
                padding: 0 16px 16px 16px;
            }
            .audio-icon-btn {
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="progress-header">
        <span class="progress-text" id="progressCounter">加载中...</span>
        <span class="completed-badge" id="completedBadge" style="display: none;"></span>
    </div>

    <div class="page-content" id="pageContent"></div>

    <div class="nav-arrows">
        <button class="nav-arrow" id="prevPageBtn">←</button>
        <button class="nav-arrow" id="nextPageBtn">→</button>
    </div>
    
    <div class="nav-actions">
        <button class="action-btn" id="resetBottomBtn">↺</button>
    </div>
</div>

<script src="chengyu-data.js"></script>
<script>
    let shuffledIndices = [];
    let currentPosition = 0;
    let currentDay = 0;
    let currentPage = 0;
    let quizAnswers = [];
    
    let completedChengyu = new Array(CHENGYU_SET.length).fill(false);

    const DAY_KEY = "chengyu3_position";
    const DATE_KEY = "chengyu3_date";
    const SHUFFLE_KEY = "chengyu3_shuffle";
    const COMPLETED_KEY = "chengyu3_completed";

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function loadProgress() {
        let savedPosition = localStorage.getItem(DAY_KEY);
        let savedDate = localStorage.getItem(DATE_KEY);
        let savedShuffle = localStorage.getItem(SHUFFLE_KEY);
        let savedCompleted = localStorage.getItem(COMPLETED_KEY);
        let today = getToday();
        
        if (savedCompleted) {
            completedChengyu = JSON.parse(savedCompleted);
        }
        
        if (!savedShuffle) {
            shuffledIndices = [...Array(CHENGYU_SET.length).keys()];
            shuffledIndices = shuffleArray(shuffledIndices);
            localStorage.setItem(SHUFFLE_KEY, JSON.stringify(shuffledIndices));
        } else {
            shuffledIndices = JSON.parse(savedShuffle);
        }
        
        if (!savedPosition || !savedDate) {
            currentPosition = 0;
            localStorage.setItem(DAY_KEY, currentPosition.toString());
            localStorage.setItem(DATE_KEY, today);
        } else if (savedDate === today) {
            currentPosition = parseInt(savedPosition, 10);
        } else {
            currentPosition = (parseInt(savedPosition, 10) + 1) % CHENGYU_SET.length;
            localStorage.setItem(DAY_KEY, currentPosition.toString());
            localStorage.setItem(DATE_KEY, today);
        }
        
        currentDay = shuffledIndices[currentPosition];
    }

    function saveCompleted() {
        localStorage.setItem(COMPLETED_KEY, JSON.stringify(completedChengyu));
    }

    function checkAndMarkCompleted() {
        const c = CHENGYU_SET[currentDay];
        const allCorrect = quizAnswers.length === c.scenarios.length && 
                           quizAnswers.every((answer, idx) => answer === c.scenarios[idx].correct);
        
        if (allCorrect && !completedChengyu[currentDay]) {
            completedChengyu[currentDay] = true;
            saveCompleted();
            return true;
        }
        return false;
    }

    function updateProgressUI() {
        const completedCount = completedChengyu.filter(v => v === true).length;
        const totalCount = CHENGYU_SET.length;
        const progressPercent = Math.round((completedCount / totalCount) * 100);
        
        document.getElementById("progressCounter").innerHTML = `📚 ${completedCount}/${totalCount} · ${progressPercent}%`;
        
        const badge = document.getElementById("completedBadge");
        if (completedChengyu[currentDay]) {
            badge.innerHTML = "✓ 已完成";
            badge.style.display = "inline-block";
        } else {
            badge.style.display = "none";
        }
    }

    // Audio playback function
    function playAudio(chengyuText) {
        if (!window.speechSynthesis) {
            alert("您的浏览器不支持语音播放");
            return;
        }
        
        // Stop any currently playing speech
        window.speechSynthesis.cancel();
        
        // Create new utterance
        const utterance = new SpeechSynthesisUtterance(chengyuText);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        
        // Try to use a Chinese voice if available
        const speak = () => {
            const voices = window.speechSynthesis.getVoices();
            const chineseVoice = voices.find(voice => voice.lang === 'zh-CN' || voice.lang === 'zh');
            if (chineseVoice) utterance.voice = chineseVoice;
            window.speechSynthesis.speak(utterance);
        };
        
        // Handle voices loaded
        if (window.speechSynthesis.getVoices().length) {
            speak();
        } else {
            window.speechSynthesis.onvoiceschanged = speak;
        }
    }

    function renderPage() {
        const c = CHENGYU_SET[currentDay];
        const container = document.getElementById("pageContent");
        const isCompleted = completedChengyu[currentDay];
        
        if (currentPage === 0) {
            container.innerHTML = `
                <div class="page1-center">
                    <div class="title-row">
                        <div class="chengyu-characters">${c.chengyu}</div>
                        <button class="audio-icon-btn" id="playAudioBtn">🔊</button>
                    </div>
                    <div class="pinyin">${c.pinyin}</div>
                    ${isCompleted ? '<div class="completed-check">✓ 已完成</div>' : ''}
                </div>
            `;
            const audioBtn = document.getElementById("playAudioBtn");
            if (audioBtn) {
                audioBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    playAudio(c.chengyu);
                });
            }
        } 
        else if (currentPage === 1) {
            container.innerHTML = `
                <div class="page2-header">
                    <div class="title-row">
                        <div class="page2-chengyu">${c.chengyu}</div>
                        <button class="audio-icon-btn" id="playAudioBtn">🔊</button>
                    </div>
                    <div class="page2-pinyin">${c.pinyin}</div>
                </div>
                <div class="meaning-first">
                    <div class="literal-meaning">📖 字面: ${c.literalTranslation}</div>
                    <div class="simple-meaning">🎯 比喻: ${c.simpleMeaning}</div>
                </div>
                <div class="char-grid">
                    ${c.breakdown.map(item => `
                        <div class="char-row">
                            <span class="char-big">${item.char}</span>
                            <span class="char-pinyin">${item.pinyin}</span>
                            <span class="char-translation">${item.english}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            const audioBtn = document.getElementById("playAudioBtn");
            if (audioBtn) {
                audioBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    playAudio(c.chengyu);
                });
            }
        } 
        else {
            if (quizAnswers.length !== c.scenarios.length) {
                quizAnswers = new Array(c.scenarios.length).fill(null);
            }
            
            let quizHtml = `
                <div class="quiz-header">
                    <div class="title-row">
                        <div class="quiz-header-chengyu">${c.chengyu}</div>
                        <button class="audio-icon-btn" id="playAudioBtn">🔊</button>
                    </div>
                    <div class="quiz-header-pinyin">${c.pinyin}</div>
                    <div class="quiz-subheader">适合这个成语吗？</div>
                </div>
            `;
            
            c.scenarios.forEach((scenario, idx) => {
                let answer = quizAnswers[idx];
                let isCorrect = (answer !== null && answer === scenario.correct);
                
                quizHtml += `<div class="scenario-card" data-idx="${idx}">
                                <div class="scenario-text">📖 ${scenario.text}</div>
                                <div class="yesno-buttons">
                                    <div class="yesno-btn ${answer !== null && answer === true ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="true">✓</div>
                                    <div class="yesno-btn ${answer !== null && answer === false ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="false">✗</div>
                                </div>`;
                
                if (answer !== null) {
                    if (isCorrect) {
                        quizHtml += `<div class="feedback-msg" style="color:#b85a3a;">✓ 正确</div>`;
                    } else {
                        quizHtml += `<div class="feedback-msg" style="color:#d49a7a;">✗ ${scenario.correct ? '这其实是适合的' : '其实不适合'}</div>`;
                    }
                }
                quizHtml += `</div>`;
            });
            
            let allAnswered = quizAnswers.every(a => a !== null);
            if (allAnswered) {
                const justCompleted = checkAndMarkCompleted();
                if (justCompleted) {
                    updateProgressUI();
                    renderPage();
                    return;
                }
                quizHtml += `<button class="reset-quiz-btn" id="resetQuizBtn">⟳ 重做</button>`;
            }
            
            container.innerHTML = quizHtml;
            
            const audioBtn = document.getElementById("playAudioBtn");
            if (audioBtn) {
                audioBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    playAudio(c.chengyu);
                });
            }
            
            document.querySelectorAll('.scenario-card').forEach(card => {
                const idx = parseInt(card.dataset.idx);
                card.querySelectorAll('.yesno-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (quizAnswers[idx] !== null) return;
                        const choice = btn.dataset.choice === 'true';
                        quizAnswers[idx] = choice;
                        renderPage();
                    });
                });
            });
            
            const resetBtn = document.getElementById("resetQuizBtn");
            if (resetBtn) resetBtn.onclick = () => {
                quizAnswers = new Array(c.scenarios.length).fill(null);
                renderPage();
            };
        }
        
        updateArrowStyles();
        updateProgressUI();
        container.scrollTop = 0;
    }

    function updateArrowStyles() {
        const nextArrow = document.getElementById("nextPageBtn");
        if (currentPage === 2) {
            nextArrow.classList.add("green");
        } else {
            nextArrow.classList.remove("green");
        }
    }

    function nextPage() { 
        if (currentPage === 2) {
            nextDay();
        } else if (currentPage < 2) { 
            currentPage++; 
            renderPage(); 
        } 
    }
    
    function prevPage() { 
        if (currentPage > 0) { 
            currentPage--; 
            renderPage(); 
        } 
    }
    
    function nextDay() {
        currentPosition = (currentPosition + 1) % CHENGYU_SET.length;
        localStorage.setItem(DAY_KEY, currentPosition.toString());
        localStorage.setItem(DATE_KEY, getToday());
        currentDay = shuffledIndices[currentPosition];
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }
    
    function resetProgress() {
        shuffledIndices = [...Array(CHENGYU_SET.length).keys()];
        shuffledIndices = shuffleArray(shuffledIndices);
        localStorage.setItem(SHUFFLE_KEY, JSON.stringify(shuffledIndices));
        
        completedChengyu = new Array(CHENGYU_SET.length).fill(false);
        saveCompleted();
        
        currentPosition = 0;
        localStorage.setItem(DAY_KEY, currentPosition.toString());
        localStorage.setItem(DATE_KEY, getToday());
        currentDay = shuffledIndices[currentPosition];
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }

    loadProgress();
    renderPage();

    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("nextPageBtn").onclick = nextPage;
    document.getElementById("resetBottomBtn").onclick = resetProgress;
</script>
</body>
</html>
