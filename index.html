<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>每日成语</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Noto Sans CJK SC', 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #fdf6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px -12px rgba(160, 80, 60, 0.15);
            overflow: hidden;
            height: 85vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* scrollable content area */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
            scroll-behavior: smooth;
        }

        /* custom scrollbar */
        .page-content::-webkit-scrollbar {
            width: 4px;
        }
        .page-content::-webkit-scrollbar-track {
            background: #f5ede5;
            border-radius: 10px;
        }
        .page-content::-webkit-scrollbar-thumb {
            background: #d4a58c;
            border-radius: 10px;
        }

        /* page 1 */
        .page1-center {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 0;
        }
        .chengyu-characters {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #8b3a2a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 20px;
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }
        .pinyin {
            font-size: 1.3rem;
            color: #c47a5a;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* page 2 */
        .page2-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0e0d4;
        }
        .page2-chengyu {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #8b3a2a;
            font-family: 'Noto Serif SC', 'KaiTi', serif;
            margin-bottom: 6px;
            white-space: nowrap;
        }
        .page2-pinyin {
            font-size: 0.85rem;
            color: #c47a5a;
        }
        .meaning-first {
            background: #fff5ef;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            border-left: 4px solid #e8b89a;
        }
        .literal-meaning {
            font-size: 0.9rem;
            color: #8b6b5a;
            margin-bottom: 8px;
        }
        .simple-meaning {
            font-size: 1rem;
            font-weight: 600;
            color: #b85a3a;
        }
        .char-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .char-row {
            background: #fffaf5;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #f0dfd2;
        }
        .char-big {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            min-width: 52px;
            color: #8b3a2a;
        }
        .char-pinyin {
            font-size: 0.75rem;
            color: #c47a5a;
            min-width: 60px;
            font-weight: 500;
        }
        .char-translation {
            flex: 1;
            font-size: 0.85rem;
            color: #8b6b5a;
        }

        /* page 3 - yes/no quiz */
        .quiz-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .quiz-header-chengyu {
            font-size: 1.8rem;
            font-weight: 600;
            color: #8b3a2a;
            margin-bottom: 8px;
        }
        .quiz-header-pinyin {
            font-size: 0.85rem;
            color: #c47a5a;
        }
        .quiz-subheader {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #b88a6a;
        }
        .scenario-card {
            background: #fff5ef;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #f0dfd2;
        }
        .scenario-text {
            font-size: 1rem;
            line-height: 1.45;
            margin-bottom: 18px;
            color: #5a3a2a;
        }
        .yesno-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .yesno-btn {
            background: white;
            border: 2px solid #e8cfbe;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            flex: 1;
            max-width: 100px;
            color: #c47a5a;
        }
        .yesno-btn:active {
            transform: scale(0.95);
        }
        .yesno-btn.selected-correct {
            background: #e8d5c4;
            border-color: #b85a3a;
            color: #8b3a2a;
        }
        .yesno-btn.selected-wrong {
            background: #f0dbd0;
            border-color: #d49a7a;
            color: #b85a3a;
        }
        .feedback-msg {
            margin-top: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }
        .reset-quiz-btn {
            background: #f0dfd2;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            color: #8b3a2a;
        }
        .reset-quiz-btn:active {
            transform: scale(0.97);
        }

        /* navigation - sticky at bottom */
        .nav-arrows {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px 12px 20px;
            border-top: 1px solid #f0dfd2;
            background: white;
            flex-shrink: 0;
        }
        .nav-arrow {
            background: #f5ede5;
            border: none;
            border-radius: 60px;
            padding: 18px 0;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #b87a5a;
            transition: all 0.1s ease;
        }
        .nav-arrow:active {
            transform: scale(0.96);
            background: #e8d9cf;
        }
        .nav-arrow.green {
            background: #e8c4b0;
            color: #8b3a2a;
        }
        
        .nav-actions {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 20px 20px 20px;
            background: white;
            flex-shrink: 0;
        }
        .action-btn {
            background: #f0dfd2;
            border: none;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #8b3a2a;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: #e4cfbf;
        }

        @media (max-width: 400px) {
            .chengyu-characters {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
            .page2-chengyu {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .nav-arrow {
                font-size: 1.6rem;
                padding: 14px 0;
            }
            .action-btn {
                font-size: 1.3rem;
                padding: 12px 0;
            }
            .yesno-btn {
                font-size: 1.4rem;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="page-content" id="pageContent"></div>

    <div class="nav-arrows">
        <button class="nav-arrow" id="prevPageBtn">←</button>
        <button class="nav-arrow" id="nextPageBtn">→</button>
    </div>
    
    <div class="nav-actions">
        <button class="action-btn" id="resetBottomBtn">↺</button>
    </div>
</div>

<script src="chengyu-data.js"></script>
<script>
    let currentDay = 0;
    let currentPage = 0;
    let quizAnswers = [];

    const DAY_KEY = "chengyu3_day";
    const DATE_KEY = "chengyu3_date";

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function loadProgress() {
        let savedDay = localStorage.getItem(DAY_KEY);
        let savedDate = localStorage.getItem(DATE_KEY);
        let today = getToday();
        if (!savedDay || !savedDate) {
            currentDay = Math.floor(Math.random() * CHENGYU_SET.length);
            localStorage.setItem(DAY_KEY, currentDay.toString());
            localStorage.setItem(DATE_KEY, today);
            return;
        }
        if (savedDate === today) {
            currentDay = parseInt(savedDay, 10) % CHENGYU_SET.length;
        } else {
            let newDay = (parseInt(savedDay, 10) + 1) % CHENGYU_SET.length;
            localStorage.setItem(DAY_KEY, newDay.toString());
            localStorage.setItem(DATE_KEY, today);
            currentDay = newDay;
        }
    }

    function renderPage() {
        const c = CHENGYU_SET[currentDay];
        const container = document.getElementById("pageContent");
        
        if (currentPage === 0) {
            container.innerHTML = `
                <div class="page1-center">
                    <div class="chengyu-characters">${c.chengyu}</div>
                    <div class="pinyin">${c.pinyin}</div>
                </div>
            `;
        } 
        else if (currentPage === 1) {
            container.innerHTML = `
                <div class="page2-header">
                    <div class="page2-chengyu">${c.chengyu}</div>
                    <div class="page2-pinyin">${c.pinyin}</div>
                </div>
                <div class="meaning-first">
                    <div class="literal-meaning">📖 字面: ${c.literalTranslation}</div>
                    <div class="simple-meaning">🎯 比喻: ${c.simpleMeaning}</div>
                </div>
                <div class="char-grid">
                    ${c.breakdown.map(item => `
                        <div class="char-row">
                            <span class="char-big">${item.char}</span>
                            <span class="char-pinyin">${item.pinyin}</span>
                            <span class="char-translation">${item.english}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        } 
        else {
            if (quizAnswers.length !== c.scenarios.length) {
                quizAnswers = new Array(c.scenarios.length).fill(null);
            }
            
            let quizHtml = `
                <div class="quiz-header">
                    <div class="quiz-header-chengyu">${c.chengyu}</div>
                    <div class="quiz-header-pinyin">${c.pinyin}</div>
                    <div class="quiz-subheader">适合这个成语吗？</div>
                </div>
            `;
            
            c.scenarios.forEach((scenario, idx) => {
                let answer = quizAnswers[idx];
                let isCorrect = (answer !== null && answer === scenario.correct);
                let isWrong = (answer !== null && answer !== scenario.correct);
                
                quizHtml += `<div class="scenario-card" data-idx="${idx}">
                                <div class="scenario-text">📖 ${scenario.text}</div>
                                <div class="yesno-buttons">
                                    <div class="yesno-btn ${answer !== null && answer === true ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="true">✓</div>
                                    <div class="yesno-btn ${answer !== null && answer === false ? (isCorrect ? 'selected-correct' : 'selected-wrong') : ''}" data-choice="false">✗</div>
                                </div>`;
                
                if (answer !== null) {
                    if (isCorrect) {
                        quizHtml += `<div class="feedback-msg" style="color:#b85a3a;">✓ 正确</div>`;
                    } else {
                        quizHtml += `<div class="feedback-msg" style="color:#d49a7a;">✗ ${scenario.correct ? '这其实是适合的' : '其实不适合'}</div>`;
                    }
                }
                quizHtml += `</div>`;
            });
            
            let allAnswered = quizAnswers.every(a => a !== null);
            if (allAnswered) {
                quizHtml += `<button class="reset-quiz-btn" id="resetQuizBtn">⟳ 重做</button>`;
            }
            
            container.innerHTML = quizHtml;
            
            document.querySelectorAll('.scenario-card').forEach(card => {
                const idx = parseInt(card.dataset.idx);
                card.querySelectorAll('.yesno-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (quizAnswers[idx] !== null) return;
                        const choice = btn.dataset.choice === 'true';
                        quizAnswers[idx] = choice;
                        renderPage();
                    });
                });
            });
            
            const resetBtn = document.getElementById("resetQuizBtn");
            if (resetBtn) resetBtn.onclick = () => {
                quizAnswers = new Array(c.scenarios.length).fill(null);
                renderPage();
            };
        }
        
        updateNavVisibility();
        
        // scroll to top when changing page
        container.scrollTop = 0;
    }

    function updateNavVisibility() {
        const nextArrow = document.getElementById("nextPageBtn");
        const navActions = document.getElementById("navActions");
        
        if (currentPage === 2) {
            navActions.innerHTML = `<button class="action-btn" id="resetBottomBtn">↺</button>`;
            nextArrow.classList.add("green");
            nextArrow.onclick = () => {
                nextDay();
            };
        } else {
            navActions.innerHTML = `<button class="action-btn" id="resetBottomBtn">↺</button>`;
            nextArrow.classList.remove("green");
            nextArrow.onclick = () => {
                if (currentPage < 2) {
                    currentPage++;
                    renderPage();
                }
            };
        }
        
        document.getElementById("resetBottomBtn").onclick = resetProgress;
    }

    function nextDay() {
        let newDay = (currentDay + 1) % CHENGYU_SET.length;
        currentDay = newDay;
        localStorage.setItem(DAY_KEY, currentDay.toString());
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }
    
    function prevPage() { 
        if (currentPage > 0) { 
            currentPage--; 
            renderPage(); 
        } 
    }
    
    function resetProgress() {
        currentDay = 0;
        localStorage.setItem(DAY_KEY, "0");
        localStorage.setItem(DATE_KEY, getToday());
        currentPage = 0;
        quizAnswers = [];
        renderPage();
    }

    loadProgress();
    renderPage();

    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("resetBottomBtn").onclick = resetProgress;
</script>
</body>
</html>
